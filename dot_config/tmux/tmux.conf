# tmux 配置檔案
# Prefix: Alt+A
# 轉換自 psmux.conf（Linux tmux 版本）

# ── 基礎設定 ──────────────────────────────────────
unbind C-b
set -g prefix M-a
bind M-a send-prefix

set -g default-terminal "xterm-256color"
set -g mouse on
set -g mode-keys vi
set -g history-limit 50000
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -sg escape-time 0

# ── 插件（TPM）──────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'

set -g @plugin 'janoamaral/tokyo-night-tmux'

set -g @plugin 'tmux-plugins/tmux-pain-control'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @resurrect-capture-pane-contents 'on'
set -g @plugin 'tmux-plugins/tmux-logging'

# 初始化 TPM（必須最後）
run '~/.tmux/plugins/tpm/tpm'


# ── 自訂快捷鍵（覆蓋插件預設）─────────────────────
# 視窗
bind c new-window -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind X confirm-before -p "kill-window #W? (y/n)" kill-window

# Pane 導航
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind Left select-pane -L
bind Down select-pane -D
bind Up select-pane -U
bind Right select-pane -R

# Pane 調整大小
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5
bind -r C-Left resize-pane -L 5
bind -r C-Down resize-pane -D 5
bind -r C-Up resize-pane -U 5
bind -r C-Right resize-pane -R 5

# 複製模式
unbind -n PageUp
bind [ copy-mode
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind ] paste-buffer
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -selection clipboard"

# 其他
bind R source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded!"
bind C-l send-keys 'clear' \; send-keys 'Enter' \; clear-history
bind S set-window-option synchronize-panes \; display-message "Sync panes: #{?synchronize-panes,ON,OFF}"
bind z resize-pane -Z

# Shift+Enter → newline
bind -n S-Enter send-keys C-j

# Ctrl+V pass-through 給底層應用（neovim Visual Block 等）
bind -n C-v send-keys C-v

# Ctrl+F12 發送 SIGINT
bind -n C-F12 send-keys C-c
