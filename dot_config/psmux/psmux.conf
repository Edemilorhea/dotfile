# psmux 配置檔案
# Prefix: Alt+A
# ── 基礎設定 ──────────────────────────────────────
unbind C-b
set -g prefix M-a
bind M-a send-prefix

set -g default-shell "nu.exe"
set -g default-terminal "xterm-256color"
set -g paste-detection on
set -g allow-predictions on
set -g allow-passthrough on
set -g mouse on
set -g mouse-selection off
set -g mode-keys vi
set -g history-limit 50000
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -sg escape-time 0

# ── 插件 ──────────────────────────────────────────
set -g @plugin 'psmux-plugins/ppm'

set -g @tokyonight-style 'night'
set -g @tokyonight-show-powerline 'on'
set -g @plugin 'psmux-plugins/psmux-theme-tokyonight'

set -g @plugin 'psmux-plugins/psmux-pain-control'
set -g @plugin 'psmux-plugins/psmux-prefix-highlight'
set -g @plugin 'psmux-plugins/psmux-resurrect'
set -g @resurrect-capture-pane-contents 'on'
set -g @plugin 'psmux-plugins/psmux-logging'

# 初始化 PPM (必須最後)
run '~/.psmux/plugins/ppm/ppm.ps1'


# ── 自訂快捷鍵 (覆蓋插件預設) ─────────────────────
# 視窗
bind c new-window -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind X confirm-before -p "kill-window #W? (y/n)" kill-window

# Pane 導航
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind Left select-pane -L
bind Down select-pane -D
bind Up select-pane -U
bind Right select-pane -R

# Pane 調整大小
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5
bind -r C-Left resize-pane -L 5
bind -r C-Down resize-pane -D 5
bind -r C-Up resize-pane -U 5
bind -r C-Right resize-pane -R 5

# 複製模式
unbind -n PageUp
bind [ copy-mode
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind ] paste-buffer
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "clip.exe"

# 其他
bind R source-file ~/.config/psmux/psmux.conf \; display-message "Config reloaded!"
bind C-l send-keys 'clear' \; send-keys 'Enter' \; clear-history
bind S set-window-option synchronize-panes \; display-message "Sync panes: #{?synchronize-panes,ON,OFF}"
bind z resize-pane -Z

# OpenCode: Shift+Enter → newline
bind -n S-Enter send-keys C-j

# Ctrl+V pass-through 給底層應用 (neovim Visual Block / OpenCode 貼上)
bind -n C-v send-keys C-v

# Ctrl+F12 強制發送 SIGINT，終止前景程序（含 opencode、neovim 等 raw-mode TUI）
# -f 旗標為自編譯版本擴充：bypass raw-mode TUI heuristic，直接送 CTRL_C_EVENT signal
# 不加 -f 的 send-keys C-c 會讓 TUI 自己處理 0x03（如 neovim 的複製模式）
bind -n C-F12 send-keys -f C-c
